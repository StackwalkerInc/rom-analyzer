repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: local
    hooks:
      - id: check-reference-name-uniqueness
        name: Check reference JSON name uniqueness
        entry: python3 scripts/check_reference_name_uniqueness.py
        language: system
        files: ^reference/.*\.json$
